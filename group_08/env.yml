name: focops_env
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python=3.10
  - pytorch
  - pandas
  - matplotlib
  - seaborn
  - numpy
  - imageio[pyav]
  - imageio-ffmpeg
  - scipy
  - pip
  - mujoco
  - gymnasium==0.29.1
  - pip:
    - gymnasium[mujoco]
    - git+https://github.com/PKU-Alignment/safety-gymnasium.git